<div class="conteneur-inscription">
  <div class="carte-inscription">
    <h2>Inscription Patient</h2>
    
    <form (ngSubmit)="soumettre()">
      <div class="groupe-champ">
        <label for="email">Adresse e-mail</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="exemple@email.com"
          required>
      </div>

      <div class="groupe-champ">
        <label for="motDePasse">Mot de passe</label>
        <input 
          type="password" 
          id="motDePasse" 
          [(ngModel)]="motDePasse" 
          name="motDePasse"
          placeholder="Minimum 6 caractères"
          required>
      </div>

      <div class="groupe-champ">
        <label for="confirmationMotDePasse">Confirmer le mot de passe</label>
        <input 
          type="password" 
          id="confirmationMotDePasse" 
          [(ngModel)]="confirmationMotDePasse" 
          name="confirmationMotDePasse"
          placeholder="Répétez votre mot de passe"
          required>
      </div>

      <div class="message-erreur" *ngIf="messageErreur">
        {{ messageErreur }}
      </div>

      <button 
        type="submit" 
        class="bouton-inscription"
        [disabled]="chargement">
        {{ chargement ? 'Inscription en cours...' : 'S\'inscrire' }}
      </button>
    </form>

    <p class="lien-connexion">
      Vous avez déjà un compte ? 
      <a routerLink="/connexion">Se connecter</a>
    </p>
  </div>
</div>
