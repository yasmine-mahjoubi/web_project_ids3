<div class="conteneur-patient">
  <header class="en-tete-patient">
    <h1>🏥 Espace Patient</h1>
    <button (click)="seDeconnecter()" class="bouton-deconnexion">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
  </header>

  <div class="contenu-patient">
    <div class="carte">
      <h2>🏥 Rechercher une Clinique</h2>
      <p>Trouvez la clinique qui vous convient</p>
      <button class="bouton-action">Voir les cliniques</button>
    </div>

    <div class="carte">
      <h2>👨‍⚕️ Trouver un Médecin</h2>
      <p>Recherchez un médecin par spécialité</p>
      <button class="bouton-action">Chercher un médecin</button>
    </div>

    <div class="carte">
      <h2>📅 Mes Rendez-vous</h2>
      <p>Consultez et gérez vos rendez-vous</p>
      <button class="bouton-action">Voir mes RDV</button>
    </div>

    <div class="carte">
      <h2>💬 Mes Commentaires</h2>
      <p>Partagez votre expérience</p>
      <button class="bouton-action">Mes avis</button>
    </div>
  </div>
</div>
