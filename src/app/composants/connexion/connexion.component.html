<div class="conteneur-connexion">
  <div class="carte-connexion">
    <h2>Connexion Patient</h2>
    
    <form (ngSubmit)="soumettre()">
      <div class="groupe-champ">
        <label for="email">Adresse e-mail</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="exemple@email.com"
          required>
      </div>

      <div class="groupe-champ">
        <label for="motDePasse">Mot de passe</label>
        <input 
          type="password" 
          id="motDePasse" 
          [(ngModel)]="motDePasse" 
          name="motDePasse"
          placeholder="Votre mot de passe"
          required>
      </div>

      <div class="message-erreur" *ngIf="messageErreur">
        {{ messageErreur }}
      </div>

      <button 
        type="submit" 
        class="bouton-connexion"
        [disabled]="chargement">
        {{ chargement ? 'Connexion en cours...' : 'Se connecter' }}
      </button>
    </form>

    <p class="lien-inscription">
      Vous n'avez pas de compte ? 
      <a routerLink="/inscription">S'inscrire</a>
    </p>
  </div>
</div>
